
<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotina Seca 30D | Método Alto Equilíbrio</title>
    
    <!-- Scripts Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; }
        
        .glow-button {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            animation: pulse-glow 2s infinite;
        }
        
        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        }
        
        .vsl-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-scrolled {
            background-color: rgba(10, 15, 29, 0.95);
            backdrop-filter: blur(10px);
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0f1d; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="bg-white text-slate-900 selection:bg-red-600 selection:text-white">
    <div id="root">Carregando a página...</div>
    <script type="module" src="/index.tsx"></script>

    <!-- UTMify Pixel -->
    <script>
      window.pixelId = "69b2ebb28e2c8bfb7c6d546c";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>

    <!-- UTMify UTMs -->
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
</body>
</html>
